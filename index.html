<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Translator</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { font-size: 1.2rem; color: #333; text-align: center; }
        textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        
        .button-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.2s; }
        
        .btn-translate { background: #4a90e2; color: white; }
        .btn-clear { background: #e0e0e0; color: #666; } /* クリアボタンのデザイン */
        .btn-mic { background: #ff5e5e; color: white; }
        
        .btn:active { transform: scale(0.98); opacity: 0.8; }
        
        #result-area { background: #f9f9f9; padding: 15px; border-radius: 8px; border-left: 5px solid #4a90e2; min-height: 50px; font-size: 18px; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌍 My Translator</h1>
    
    <textarea id="source-text" placeholder="ここに日本語を入力、または音声で話してください..."></textarea>
    
    <div class="button-group">
        <button class="btn btn-clear" onclick="clearText()">クリア</button>
        <button class="btn btn-translate" onclick="translateText()">翻訳</button>
        <button class="btn btn-mic" id="mic-btn">🎤 音声</button>
    </div>

    <div id="result-area">翻訳結果がここに表示されます</div>
</div>

<script>
    const sourceText = document.getElementById('source-text');
    const resultArea = document.getElementById('result-area');

    // 1. 文字を消去する機能（今回追加）
    function clearText() {
        sourceText.value = "";       // 入力エリアを空にする
        resultArea.innerText = "翻訳結果がここに表示されます"; // 結果表示をリセット
    }

    // 2. 翻訳機能（MyMemory API）
    async function translateText() {
        const text = sourceText.value;
        if (!text) return;

        resultArea.innerText = "翻訳中...";
        try {
            const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=ja|en`);
            const data = await response.json();
            const translated = data.responseData.translatedText;
            resultArea.innerText = translated;

            // 翻訳後に英語で読み上げる
            const uttr = new SpeechSynthesisUtterance(translated);
            uttr.lang = 'en-US';
            window.speechSynthesis.speak(uttr);
        } catch (error) {
            resultArea.innerText = "エラーが発生しました。";
        }
    }

    // 3. 音声入力機能
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';

        document.getElementById('mic-btn').onclick = () => {
            recognition.start();
        };

        recognition.onresult = (event) => {
            sourceText.value = event.results[0][0].transcript;
            translateText(); // 聞き取り終わったら自動で翻訳
        };
    }
</script>

</body>
</html>
