<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translator Gray Modern</title>
    <style>
        /* 背景をグレーに設定 */
        body { font-family: sans-serif; background: #cbd5e0; display: flex; justify-content: center; padding: 15px; }
        .container { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 450px; }
        
        /* 最上段：モード表示と言語切替を横並びに */
        .header-row { 
            display: flex; justify-content: space-between; align-items: center;
            background: #edf2f7; padding: 10px 15px; border-radius: 12px; margin-bottom: 15px;
        }
        #mode-text { color: #4a90e2; font-weight: bold; font-size: 0.95rem; }
        .btn-switch { background: #4a5568; color: white; padding: 8px 12px; border-radius: 8px; border: none; font-size: 12px; cursor: pointer; }

        textarea { width: 100%; height: 120px; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 16px; margin-bottom: 15px; outline: none; }
        
        /* 下段：ボタンを横一列に配置（クリア、翻訳を実行、再生/停止、音声入力） */
        /* 比率を 1 : 2.5 : 1.2 : 1.2 くらいに調整して翻訳ボタンを広くする */
        .row-lower { 
            display: grid; 
            grid-template-columns: 1fr 2.5fr 1.2fr 1.2fr; 
            gap: 6px; 
            align-items: center;
        }

        .btn { padding: 12px 2px; border: none; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: bold; transition: 0.1s; white-space: nowrap; }
        
        /* ボタンごとの色設定 */
        .btn-clear { background: #e2e8f0; color: #4a5568; }
        .btn-translate { background: #4a90e2; color: white; font-size: 13px; } 
        .btn-speak { background: #48bb78; color: white; }
        .btn-mic { background: #f56565; color: white; }

        .btn:active { transform: scale(0.95); opacity: 0.8; }

        #result-area { 
            margin-top: 15px; padding: 12px; background: #f8fafc; border-radius: 10px; 
            border-left: 6px solid #4a90e2; min-height: 60px; font-size: 1.1rem; color: #1a202c;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-row">
        <span id="mode-text">🇯🇵 日本語 ➔ 🇺🇸 英語</span>
        <button class="btn-switch" onclick="toggleMode()">🔄 言語切替</button>
    </div>
    
    <textarea id="source-text" placeholder="入力を開始..."></textarea>
    
    <div class="row-lower">
        <button class="btn btn-clear" onclick="clearAll()">🗑️ クリア</button>
        <button class="btn btn-translate" onclick="executeTranslation()">翻訳を実行</button>
        <button id="speak-btn" class="btn btn-speak" onclick="handleSpeak()">🔊 再生/停止</button>
        <button id="mic-btn" class="btn btn-mic">🎤 音声入力</button>
    </div>

    <div id="result-area">結果が表示されます</div>
</div>

<script>
    let currentMode = 'ja-en';
    const modeText = document.getElementById('mode-text');
    const sourceText = document.getElementById('source-text');
    const resultArea = document.getElementById('result-area');
    let currentTranslation = ""; 

    function toggleMode() {
        if (currentMode === 'ja-en') {
            currentMode = 'en-ja';
            modeText.innerText = "🇺🇸 英語 ➔ 🇯🇵 日本語";
            sourceText.placeholder = "Enter English text...";
        } else {
            currentMode = 'ja-en';
            modeText.innerText = "🇯🇵 日本語 ➔ 🇺🇸 英語";
            sourceText.placeholder = "日本語を入力してください...";
        }
        clearAll();
    }

    function clearAll() {
        sourceText.value = "";
        resultArea.innerText = "結果が表示されます";
        currentTranslation = "";
        window.speechSynthesis.cancel(); 
    }

    async function executeTranslation() {
        const text = sourceText.value.trim();
        if (!text) return;

        const langPair = (currentMode === 'ja-en') ? "ja|en" : "en|ja";
        resultArea.innerText = "翻訳中...";

        try {
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${langPair}`;
            const response = await fetch(url);
            const data = await response.json();
            currentTranslation = data.responseData.translatedText;
            resultArea.innerText = currentTranslation;
        } catch (e) {
            resultArea.innerText = "通信エラーが発生しました。";
        }
    }

    function handleSpeak() {
        if (window.speechSynthesis.speaking) {
            window.speechSynthesis.cancel();
        } else {
            if (currentTranslation) {
                const uttr = new SpeechSynthesisUtterance(currentTranslation);
                uttr.lang = (currentMode === 'ja-en') ? 'en-US' : 'ja-JP';
                window.speechSynthesis.speak(uttr);
            }
        }
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        document.getElementById('mic-btn').onclick = () => {
            recognition.lang = (currentMode === 'ja-en') ? 'ja-JP' : 'en-US';
            recognition.start();
        };
        recognition.onresult = (event) => {
            sourceText.value = event.results[0][0].transcript;
            executeTranslation();
        };
    }
</script>

</body>
</html>
